--- # Merge policy applied to the e2e test fixture repository.
#
# Schema: see /designs/merge-time-constraints.md §4.2.
#
# Required reviewer: the `reviewer` agent must approve before merge.
# Mergers: omitted, so anyone may run `hydra patches merge` once the
# reviewer-approval condition is satisfied.
reviewers:
  - label: code-review
    any_of:
      - reviewer
