# Hydra E2E test configuration
# Usage: hydra-single-player server init --config tests/e2e/config/test-config.yaml
#
# Required environment variables:
#   CLAUDE_CODE_OAUTH_TOKEN - OAuth token for Claude Code (or ANTHROPIC_API_KEY)
#   ANTHROPIC_API_KEY       - Anthropic API key (alternative to CLAUDE_CODE_OAUTH_TOKEN)
#   GH_TOKEN                - GitHub personal access token (repo scope)
#
# At least one of CLAUDE_CODE_OAUTH_TOKEN or ANTHROPIC_API_KEY must be set.
# These keys are NOT listed under `hydra:` here on purpose: an empty value (from
# e.g. an unset env var via `${VAR:-}`) is rejected by setup_local_auth. The
# e2e bootstrap script (tests/e2e/run.sh) instead appends only the keys whose
# env vars are non-empty, then passes the resulting file to `hydra-sp server init`.

hydra:
  namespace: "test"
  server_hostname: "127.0.0.1:8080"
  HYDRA_SECRET_ENCRYPTION_KEY: "KioqKioqKioqKioqKioqKioqKioqKioqKioqKioqKio="

job:
  default_model: "opus"
  default_image: "hydra-worker:latest"

storage_backend: "sqlite"
sqlite_path: "/tmp/hydra-e2e/hydra.db"

job_engine: "local"
log_dir: "/tmp/hydra-e2e/job-logs"

auth_mode: "local"
auth_token_file: "/tmp/hydra-e2e-auth-token"
github_token: "${GH_TOKEN}"
username: "test-agent"
