  <!-- Tongue -->
  <line x1="80" y1="50" x2="87" y2="46" stroke="#00CC66" stroke-width="2" stroke-linecap="round"/>
  <line x1="80" y1="50" x2="87" y2="54" stroke="#00CC66" stroke-width="2" stroke-linecap="round"/>
</svg>
