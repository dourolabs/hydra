  <circle cx="332" cy="92" r="4" fill="#0a0a0a"/>
  <!-- Subtle glow effect -->
  <path d="M256 420 C230 380, 200 340, 210 300 C215 280, 230 270, 256 260 C282 270, 297 280, 302 300 C312 340, 282 380, 256 420Z" fill="#00CC66" opacity="0.15" filter="url(#glow)"/>
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
