apiVersion: v1
kind: Service
metadata:
  name: metis-web
  namespace: metis
  labels:
    app: metis-web
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: metis-web
spec:
  type: LoadBalancer
  selector:
    app: metis-web
  ports:
    - port: 80
      targetPort: 4000
      protocol: TCP
