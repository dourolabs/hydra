name: Release hydra-worker image

on:
  push:
    tags:
      - v*

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        run: |
          owner="${{ github.repository_owner }}"
          echo "name=${owner,,}/hydra-worker" >> "$GITHUB_OUTPUT"

      - name: Set image tag to version of the git tag
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          PREFIX="refs/tags/"
          VERSION="${GITHUB_REF:${#PREFIX}}"
          echo "IMAGE_TAG=${VERSION}" >> "${GITHUB_ENV}"
      - name: Set image tag to the git commit hash
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          echo "IMAGE_TAG=${{ github.sha }}" >> "${GITHUB_ENV}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push hydra-worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: images/metis-worker.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest
          cache-from: type=gha,scope=hydra-worker
          cache-to: type=gha,mode=max,scope=hydra-worker
