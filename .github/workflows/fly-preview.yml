name: Deploy Preview App
on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: read
  packages: write
  pull-requests: read

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  FLY_REGION: lax
  FLY_ORG: personal
  REGISTRY: ghcr.io

jobs:
  preview_app:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    concurrency:
      group: ${{ matrix.app }}-pr-${{ github.event.number }}
    environment:
      name: ${{ matrix.app }}-preview
      url: ${{ steps.deploy.outputs.url }}
    strategy:
      matrix:
        app: [component-library, ui]
    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        run: |
          owner="${{ github.repository_owner }}"
          echo "name=${owner,,}/metis-${{ matrix.app }}-preview" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: github.event.action != 'closed'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event.action != 'closed'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: github.event.action != 'closed'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: images/metis-${{ matrix.app }}.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:pr-${{ github.event.number }}
          cache-from: type=gha,scope=metis-${{ matrix.app }}-preview
          cache-to: type=gha,mode=max,scope=metis-${{ matrix.app }}-preview

      - name: Deploy PR app to Fly.io
        id: deploy
        uses: cprussin/fly-pr-review-apps@main
        with:
          name: metis-${{ matrix.app }}-pr-${{ github.event.number }}
          config: ./metis-${{ matrix.app }}/fly.toml
          image: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:pr-${{ github.event.number }}
