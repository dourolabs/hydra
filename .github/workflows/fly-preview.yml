name: Deploy Preview App
on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  FLY_REGION: lax
  FLY_ORG: personal

jobs:
  preview_app:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    concurrency:
      group: ${{ matrix.app }}-pr-${{ github.event.number }}
    environment:
      name: ${{ matrix.app }}-preview
      url: ${{ steps.deploy.outputs.url }}
    strategy:
      matrix:
        app: [component-library, ui]
    steps:
      - name: Get code
        uses: actions/checkout@v4
      - name: Deploy PR app to Fly.io
        id: deploy
        uses: cprussin/fly-pr-review-apps@main
        with:
          name: metis-${{ matrix.app }}-pr-${{ github.event.number }}
          config: ./metis-${{ matrix.app }}/fly.toml
