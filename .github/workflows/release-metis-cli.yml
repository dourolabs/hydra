name: Release metis CLI

on:
  push:
    tags:
      - v*
  pull_request:
    paths:
      - .github/workflows/release-metis-cli.yml

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build metis CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rust_targets: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: universal-apple-darwin
            rust_targets: |
              x86_64-apple-darwin
              aarch64-apple-darwin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy, rustfmt
          targets: ${{ matrix.rust_targets }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install OpenSSL (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openssl@3
          OPENSSL_PREFIX="$(brew --prefix openssl@3)"
          echo "OPENSSL_DIR=${OPENSSL_PREFIX}" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=${OPENSSL_PREFIX}/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=${OPENSSL_PREFIX}/lib" >> "$GITHUB_ENV"

      - name: Build metis CLI (Linux)
        if: runner.os != 'macOS'
        run: cargo build -p metis --release --target ${{ matrix.target }}

      - name: Build metis CLI (macOS universal)
        if: runner.os == 'macOS'
        run: |
          for target in x86_64-apple-darwin aarch64-apple-darwin; do
            cargo build -p metis --release --target "${target}"
          done
          mkdir -p target/universal-apple-darwin/release
          lipo -create \
            -output target/universal-apple-darwin/release/metis \
            target/x86_64-apple-darwin/release/metis \
            target/aarch64-apple-darwin/release/metis
          lipo -info target/universal-apple-darwin/release/metis

      - name: Prepare artifact
        id: package
        run: |
          BIN_PATH="target/${{ matrix.target }}/release/metis"
          ARTIFACT_NAME="metis-${{ matrix.target }}"
          mkdir -p artifacts
          cp "${BIN_PATH}" "artifacts/${ARTIFACT_NAME}"
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: artifacts/${{ steps.package.outputs.artifact_name }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
