name: Release metis CLI

on:
  push:
    tags:
      - v*
  pull_request:
    paths:
      - .github/workflows/release-metis-cli.yml

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build metis CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rust_targets: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: universal-apple-darwin
            rust_targets: |
              x86_64-apple-darwin
              aarch64-apple-darwin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy, rustfmt
          targets: ${{ matrix.rust_targets }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install OpenSSL (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openssl@3
          OPENSSL_PREFIX="$(brew --prefix openssl@3)"
          echo "OPENSSL_DIR=${OPENSSL_PREFIX}" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=${OPENSSL_PREFIX}/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=${OPENSSL_PREFIX}/lib" >> "$GITHUB_ENV"

      - name: Build metis CLI (Linux)
        if: runner.os != 'macOS'
        run: cargo build -p metis --features vendored-openssl --release --target ${{ matrix.target }}

      - name: Build metis CLI (macOS universal)
        if: runner.os == 'macOS'
        run: |
          for target in x86_64-apple-darwin aarch64-apple-darwin; do
            cargo build -p metis --features vendored-openssl --release --target "${target}"
          done
          mkdir -p target/universal-apple-darwin/release
          lipo -create \
            -output target/universal-apple-darwin/release/metis \
            target/x86_64-apple-darwin/release/metis \
            target/aarch64-apple-darwin/release/metis
          lipo -info target/universal-apple-darwin/release/metis

      - name: Prepare artifact
        id: package
        run: |
          BIN_PATH="target/${{ matrix.target }}/release/metis"
          ARTIFACT_NAME="metis-${{ matrix.target }}"
          mkdir -p artifacts
          cp "${BIN_PATH}" "artifacts/${ARTIFACT_NAME}"
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: artifacts/${{ steps.package.outputs.artifact_name }}
          if-no-files-found: error

  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build
      - package-deb
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  package-deb:
    name: Build Debian package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy, rustfmt
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Debian packaging tooling
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends dpkg-dev

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build Debian package
        run: cargo deb -p metis --features vendored-openssl --target x86_64-unknown-linux-gnu

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: metis-deb
          path: target/x86_64-unknown-linux-gnu/debian/*.deb
          if-no-files-found: error

  publish-apt:
    name: Publish APT package
    if: startsWith(github.ref, 'refs/tags/')
    needs: package-deb
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download Debian package
        uses: actions/download-artifact@v4
        with:
          name: metis-deb
          path: dist

      - name: Configure Cloudsmith CLI
        uses: cloudsmith-io/cloudsmith-cli-action@v1
        with:
          oidc-namespace: ${{ vars.CLOUDSMITH_NAMESPACE }}
          oidc-service-slug: ${{ vars.CLOUDSMITH_SERVICE_SLUG }}

      - name: Upload package to Cloudsmith APT
        run: >
          cloudsmith push deb
          ${{ vars.CLOUDSMITH_NAMESPACE }}/${{ vars.CLOUDSMITH_APT_REPOSITORY }}/${{ vars.CLOUDSMITH_APT_DISTRO }}/${{ vars.CLOUDSMITH_APT_RELEASE }}
          dist/*.deb

  publish-homebrew:
    name: Publish Homebrew formula
    if: startsWith(github.ref, 'refs/tags/')
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Update Homebrew formula
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: ${{ vars.HOMEBREW_FORMULA || 'metis' }}
          homebrew-tap: ${{ vars.HOMEBREW_TAP || 'dourolabs/homebrew-metis' }}
          download-url: https://github.com/${{ github.repository }}/archive/refs/tags/${{ github.ref_name }}.tar.gz
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_COMMITTER_TOKEN }}
