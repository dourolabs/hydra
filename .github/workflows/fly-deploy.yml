name: Fly Deploy
on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ matrix.app }}
    strategy:
      matrix:
        app: [component-library, ui]
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        run: |
          owner="${{ github.repository_owner }}"
          echo "name=${owner,,}/metis-${{ matrix.app }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: images/metis-${{ matrix.app }}.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest
          cache-from: type=gha,scope=metis-${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=metis-${{ matrix.app }}

      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --image ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ github.sha }} --config ./metis-${{ matrix.app }}/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
