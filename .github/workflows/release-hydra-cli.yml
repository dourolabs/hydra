name: Release hydra

on:
  push:
    tags:
      - v*
  pull_request:
    paths:
      - .github/workflows/release-hydra-cli.yml

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-cli:
    name: Build CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rust_targets: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: universal-apple-darwin
            rust_targets: |
              x86_64-apple-darwin
              aarch64-apple-darwin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy, rustfmt
          targets: ${{ matrix.rust_targets }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install OpenSSL (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openssl@3
          OPENSSL_PREFIX="$(brew --prefix openssl@3)"
          echo "OPENSSL_DIR=${OPENSSL_PREFIX}" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=${OPENSSL_PREFIX}/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=${OPENSSL_PREFIX}/lib" >> "$GITHUB_ENV"

      - name: Build hydra CLI (Linux)
        if: runner.os != 'macOS'
        run: cargo build -p hydra --features vendored-openssl --release --target ${{ matrix.target }}

      - name: Build hydra CLI (macOS universal)
        if: runner.os == 'macOS'
        run: |
          for target in x86_64-apple-darwin aarch64-apple-darwin; do
            cargo build -p hydra --features vendored-openssl --release --target "${target}"
          done
          mkdir -p target/universal-apple-darwin/release
          lipo -create \
            -output target/universal-apple-darwin/release/hydra \
            target/x86_64-apple-darwin/release/hydra \
            target/aarch64-apple-darwin/release/hydra
          lipo -info target/universal-apple-darwin/release/hydra

      - name: Prepare artifact
        id: package
        run: |
          BIN_PATH="target/${{ matrix.target }}/release/hydra"
          ARTIFACT_NAME="hydra-${{ matrix.target }}"
          mkdir -p artifacts
          cp "${BIN_PATH}" "artifacts/${ARTIFACT_NAME}"
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: artifacts/${{ steps.package.outputs.artifact_name }}
          if-no-files-found: error

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('metis-web/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        working-directory: metis-web
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: metis-web
        run: pnpm build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: |
            metis-web/packages/api/dist
            metis-web/packages/ui/dist
            metis-web/packages/web/dist
          retention-days: 1

  build-single-player:
    name: Build single-player (${{ matrix.target }})
    needs: build-frontend
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: metis-web/packages

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install OpenSSL (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openssl@3
          OPENSSL_PREFIX="$(brew --prefix openssl@3)"
          echo "OPENSSL_DIR=${OPENSSL_PREFIX}" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=${OPENSSL_PREFIX}/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=${OPENSSL_PREFIX}/lib" >> "$GITHUB_ENV"

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build hydra binary
        run: cargo build -p hydra --features vendored-openssl --release --target ${{ matrix.target }}

      - name: Prepare artifact
        id: package
        run: |
          ARTIFACT_NAME="hydra-single-player-${{ matrix.target }}"
          mkdir -p artifacts
          cp "target/${{ matrix.target }}/release/hydra" "artifacts/${ARTIFACT_NAME}"
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: artifacts/${{ steps.package.outputs.artifact_name }}
          if-no-files-found: error

  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-cli, build-single-player]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: hydra-*
          merge-multiple: true

      - name: Generate checksums
        run: (cd dist && sha256sum * > SHA256SUMS.txt)

      - name: Publish tagged release to public repo
        env:
          GH_TOKEN: ${{ secrets.HYDRA_RELEASES_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release view "$TAG" -R dourolabs/metis-releases >/dev/null 2>&1 || \
            gh release create "$TAG" -R dourolabs/metis-releases \
              --title "$TAG" \
              --notes "Automated release for $TAG"
          gh release upload "$TAG" dist/* -R dourolabs/metis-releases --clobber

      - name: Publish latest release to public repo
        env:
          GH_TOKEN: ${{ secrets.HYDRA_RELEASES_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release delete latest -R dourolabs/metis-releases --yes --cleanup-tag 2>/dev/null || true
          gh release create latest -R dourolabs/metis-releases \
            --title "Latest Release ($TAG)" \
            --notes "Latest build from $TAG" \
            --latest
          gh release upload latest dist/* -R dourolabs/metis-releases --clobber

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
