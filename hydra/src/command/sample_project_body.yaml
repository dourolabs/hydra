# Project body file consumed by `hydra projects create --body-file` and
# `hydra projects update --body-file`. Holds an ordered list of statuses
# (the project-specific issue lifecycle).
#
# Edit the fields to taste, then create the project with:
#
#     hydra projects create --key <slug> --name "<name>" \
#         --body-file <this-file>
#
# The project-level prompt path (set separately via
# `hydra projects update --prompt-path /path/to/project.md`) is intentionally
# NOT part of this file; keep it out of band so body-file edits don't
# accidentally clobber it.

statuses:
  # Triage / landing zone. No `on_enter`, no `prompt_path`: the issue sits
  # here until a human or automation moves it forward, and no agent session
  # is spawned on arrival.
  - key: inbox                # status slug; lowercase letters, digits, `-`, ≤64 chars (see hydra-common `define_key_newtype!`).
    label: Inbox              # human-readable label shown in the UI.
    color: "#607d8b"          # CSS-style `#RRGGBB` hex color for the status chip.
    unblocks_parents: false   # When true, a child entering this status no longer counts as "blocking" its parent's readiness.
    unblocks_dependents: false # When true, downstream issues that depend on this one become eligible to start once this status is reached.
    cascades_to_children: false # When true, applying this status to a parent re-applies it to children (e.g. closing a parent closes its children).

  - key: in-development
    label: In development
    color: "#3498db"
    unblocks_parents: false
    unblocks_dependents: false
    cascades_to_children: false
    on_enter:
      # assign_to: sets the assignee on the issue when it enters this status
      # (agent assignees trigger session spawn via the existing assignee-driven
      # dispatcher). Tagged form: `!User { name: alice }`, `!Agent { name: swe }`,
      # or `!External { system: github, username: jayantk }`.
      assign_to: !Agent { name: swe }
    # prompt_path: doc-store path for the per-status prompt slice concatenated
    # into spawned-session system prompts. Omit on terminal statuses.
    prompt_path: /projects/sample/statuses/in-development.md

  - key: pair-development
    label: Pair development
    color: "#1abc9c"
    unblocks_parents: false
    unblocks_dependents: false
    cascades_to_children: false
    # interactive: when true, ready issues landing in this status spawn a
    # Conversation (live chat) instead of a headless session.
    interactive: true
    on_enter:
      assign_to: !Agent { name: swe }
    prompt_path: /projects/sample/statuses/pair-development.md

  - key: in-review
    label: In review
    color: "#f1c40f"
    unblocks_parents: false
    unblocks_dependents: false
    cascades_to_children: false
    on_enter:
      assign_to: !Agent { name: reviewer }
      # attach_form: replaces `issue.form` with the form at this doc-store path
      # on transition into this status. An issue holds at most one form at a
      # time, so this wholesale-replaces any prior form.
      attach_form: /forms/review.yaml
    prompt_path: /projects/sample/statuses/in-review.md

  # Terminal-ish success status: the work is done from this project's
  # perspective, so anything blocked on it (parents, dependents) is freed.
  # No `on_enter` / `prompt_path` — no agent session is spawned on arrival.
  - key: pending-release
    label: Pending release
    color: "#2ecc71"
    unblocks_parents: true
    unblocks_dependents: true
    cascades_to_children: false

  # Hard-close: also cascades to children so closing a parent issue auto-closes
  # any open child issues that hadn't terminated yet.
  - key: done
    label: Done
    color: "#27ae60"
    unblocks_parents: true
    unblocks_dependents: true
    cascades_to_children: true
