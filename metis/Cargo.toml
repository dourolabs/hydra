[package]
name = "metis"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0"
bytes = "1.6"
clap = { version = "4.5", features = ["derive"] }
futures = "0.3"
shellexpand = "3.1"
serde = { version = "1.0", features = ["derive"] }
tokio = { version = "1.38", features = ["macros", "rt-multi-thread"] }
toml = "0.8"
metis-common = { path = "../metis-common" }
reqwest = { version = "0.12", features = ["json", "stream"] }
