[package]
name = "metis"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0"
async-trait = "0.1"
bytes = "1.6"
clap = { version = "4.5", features = ["derive"] }
futures = "0.3"
shellexpand = "3.1"
serde = { version = "1.0", features = ["derive"] }
tokio = { version = "1.38", features = ["macros", "rt-multi-thread"] }
toml = "0.8"
metis-common = { path = "../metis-common" }
metis-cli-util = { path = "../metis-cli-util" }
reqwest = { version = "0.12", features = ["json", "stream"] }
base64 = "0.22"
tar = "0.4"
tempfile = "3.13"
flate2 = "1.0"
textwrap = { version = "0.16", features = ["terminal_size"] }
chrono = { version = "0.4", features = ["clock"] }
owo-colors = "4.1"
serde_yaml = "0.9"
