env:
  - name: FOO
    value: 0
  - name: BAR

tasks:
  generate-patch:
    type: codex
    prompt: >
      please write unit tests for the metis spawn CLI command, making sure to consider corner cases.
  
  code-review:
    inputs: generate-patch
    type: codex
    prompt: >
      You are a code review agent who is responsible for approving or 
      rejecting the changes from a contributor. Please look at the changes in patch.txt 
      as being applied to the current repository. 

      If the code *does not* meet your standards, please write the reasons it does not 
      into the .metis/output/error.txt file. If the code looks good, do not generate this file.

      The value of foo is $FOO

      The task provided to the prior contributor was as follows      
    setup:
      - echo "this is the setup"
      - echo "$PROMPT"
      - echo "$FOO"

  merge:
    inputs: code-review
    type: codex
    prompt: >
      You are assigned to merge the given patch in to the provided repository. Please
      check for any merge conflicts and fix them.
    setup:
      - echo "this is the setup"
    cleanup:
      - echo "this is the cleanup"
