variables:
  - name: PROMPT
  - name: GH_TOKEN
  - name: ONTO
    value: main

tasks:
  fix-merge:
    type: codex
    prompt: >
      The current git repository is being rebased on to main and may contain conflicts.
      Please fix the conflicts and complete the rebase. You may look at the git log to
      understand the history of changes and determine how to resolve the conflicts.      
    setup:
      - git merge $ONTO || true
    cleanup:
      - |
          set -euo pipefail

          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "GH_TOKEN not set; skipping PR creation."
            exit 0
          fi

          git add -A 

          git commit -m "task ${METIS_ID}" || true
          branch_name=$(git rev-parse --abbrev-ref HEAD)
          git push --force-with-lease origin "${branch_name}"
